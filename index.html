<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Site</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        /* Make the image look great on any screen size */
        img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }
        /* Overlay to bypass browser autoplay restrictions safely */
        #interaction-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Clickable overlay to start background audio smoothly -->
    <div id="interaction-overlay" onclick="startSite()">
        <div>el ferias</div>
    </div>

    <!-- Hidden loopable audio element -->
    <audio id="bg-audio" src="yo en la feria.mp3" loop></audio>

    <!-- Main display image -->
    <img src="el ferias.png" alt="Display Image">

    <script>
        function startSite() {
            const audio = document.getElementById('bg-audio');
            const overlay = document.getElementById('interaction-overlay');
            
            // Play audio and hide overlay
            audio.play().catch(error => console.log("Audio play blocked:", error));
            overlay.style.display = 'none';
        }
    </script>

</body>
</html>
